<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 3e</title>
</head>
<body>
    <style>
         .apply{
            background: rgb(10, 102, 194);
            color: white;
            font-family: 'Arial';
            border-radius: 20px;
            border: none;
            padding: 5px 20px;
            font-size: 13px;
            margin-right: 10px;
            cursor: pointer;
        }
        .apply:hover{
            background-color: rgb(2,70,138);
        }
        .save{
            background: white;
            color: rgb(10, 102, 194);
            border-color: rgb(10, 102, 194);
            font-family: sans-serif;
            border-radius: 20px;
            border: 1px solid rgb(10, 102, 194);
            padding: 5px 15px;
            font-size: 13px;
            cursor: pointer;
        }
        .save:hover{
            background-color: rgba(193, 221, 236, 0.566);
        }
    </style>
    <h3>3e</h3>
    <button class="apply">Apply on company website</button><button class="save">Save</button>
</body>
</html>
