<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 3d</title>
</head>
<body>
    <style>
        .purple{
            background: rgb(121, 82, 179);
            color: white;
            border: none;
            font-family: 'Arial';
            border-radius: 5px;
            padding: 10px 30px;
            font-size: 13px;
            margin-right: 10px;
            cursor: pointer;
        }
        .purple:hover{
            background-color: rgb(99,60,156)
        }
        .white{
            background: white;
            color: rgb(108, 117, 125);
            font-family: 'Arial';
            padding: 10px 30px;
            font-size: 13px;
            border-color:rgb(0, 0, 0);
            border: 1px solid rgb(108, 117, 125);
            border-radius: 5px;
            cursor: pointer;
        }
        .white:hover{
            background-color: rgb(108,117,125);
            color: white;
        }
    </style>
    <h3>3d</h3>
    <button class="purple">Get started</button><button class="white">Download</button>
</body>
</html>
