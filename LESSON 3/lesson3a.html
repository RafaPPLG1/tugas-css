<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 3 : Bintang</title>
    <style>
        .uber{
            background-color: black;
            color: white;
            padding: 12px 20px;
            font-family: Arial;
            font-size: 13px;
            border: none;
            cursor: pointer;
            font-family: verdana;
        }
        .uber:hover{
            opacity: 0.7;
        }
        .amazon{
            background-color:rgb(255, 216, 20);
            border: none;
            font-size: 13px;
            border-radius: 20px;
            padding: 10px 60px;
            cursor: pointer;
            font-family: Tahoma;
        }
        .amazon:hover{
            background-color: rgb(230,185,2);
        }
        .GitHub{
            background: rgb(46, 164, 79);
            color:white;
            font-family: 'Helvetica';
            border-radius: 5px;
            border: none;
            padding: 10px 30px;
            font-size: 13px;
            cursor: pointer;
        }
        .GitHub:hover{
            box-shadow: 0px 5px 8px rgba(0,0,0,0.5);
        }
        .purple{
            background: rgb(121, 82, 179);
            color: white;
            border: none;
            font-family: 'Arial';
            border-radius: 5px;
            padding: 10px 30px;
            font-size: 13px;
            margin-right: 10px;
            cursor: pointer;
        }
        .purple:hover{
            background-color: rgb(99,60,156)
        }
        .white{
            background: white;
            color: rgb(108, 117, 125);
            font-family: 'Arial';
            padding: 10px 30px;
            font-size: 13px;
            border-color:rgb(0, 0, 0);
            border: 1px solid rgb(108, 117, 125);
            border-radius: 5px;
            cursor: pointer;
        }
        .white:hover{
            background-color: rgb(108,117,125);
            color: white;
        }
        .apply{
            background: rgb(10, 102, 194);
            color: white;
            font-family: 'Arial';
            border-radius: 20px;
            border: none;
            padding: 5px 20px;
            font-size: 13px;
            margin-right: 10px;
            cursor: pointer;
        }
        .apply:hover{
            background-color: rgb(2,70,138);
        }
        .save{
            background: white;
            color: rgb(10, 102, 194);
            border-color: rgb(10, 102, 194);
            font-family: sans-serif;
            border-radius: 20px;
            border: 1px solid rgb(10, 102, 194);
            padding: 5px 15px;
            font-size: 13px;
            cursor: pointer;
        }
        .save:hover{
            background-color: rgba(193, 221, 236, 0.566);
        }
    </style>
</head>
<body>
    <h3>3a</h3>
    <button class="uber">Request now</button>

    <h3>3b</h3>
    <button class="amazon">Add to Cart</button>

    <h3>3c</h3>
    <button class="GitHub">Sign up</button>

    <h3>3d</h3>
    <button class="purple">Get started</button><button class="white">Download</button>

    <h3>3e</h3>
    <button class="apply">Apply on company website</button><button class="save">Save</button>
</body>
</html>
