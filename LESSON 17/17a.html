<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Clone - Fix Size</title>
  
  <style>
    /* KODE CSS LANGSUNG DI MASUKKAN KE SINI BIAR PASTI KE-READ */
    body {
      font-family: Roboto, Arial, sans-serif;
      padding: 20px;
      background-color: #ffffff;
    }

    /* INI YANG MEMBATASI UKURAN GAMBAR BIAR TIDAK SE-LAYAR */
    .video-card {
      width: 300px; 
      display: inline-block;
    }

    .video-thumbnail {
      width: 100%;          
      border-radius: 12px; 
      display: block;
    }

    .video-info-grid {
      display: flex; 
      margin-top: 12px; 
      gap: 12px;
    }

    .thumbnail-link, .channel-link {
      text-decoration: none;
      display: inline-block;
    }

    .video-title-link {
      color: black;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      line-height: 20px;
    }

    /* CSS Avatar & Tooltip */
    .channel-picture-container {
      display: inline-block;
      position: relative;
    }

    .avatar-circle {
      width: 40px;
      height: 40px;
      background-color: #c00; 
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }

    .channel-tooltip {
      position: absolute;
      bottom: -75px;
      left: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      background-color: white;
      padding: 10px 15px;
      border-radius: 8px;
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.18);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 100;
    }

    .avatar-circle-large {
      width: 50px;
      height: 50px;
      background-color: #c00;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 22px;
    }

    .tooltip-info {
      display: flex;
      flex-direction: column;
    }

    .tooltip-name {
      font-weight: bold;
      font-size: 15px;
      color: black;
    }

    .tooltip-subscribers {
      font-size: 13px;
      color: rgb(96, 96, 96);
      margin-top: 2px;
    }

    .channel-picture-container:hover .channel-tooltip {
      opacity: 1;
      pointer-events: auto;
    }

    .video-author, .video-stats {
      margin: 4px 0 0 0; 
      color: #606060; 
      font-size: 12px;
    }

    /* Media Query Lesson 17a */
    @media (min-width: 1000.1px) {
      .video-title-link {
        font-size: 16px;
        line-height: 24px;
      }
      .video-author, .video-stats {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="video-card">
    
    <a href="https://www.youtube.com/watch?v=fNKUx1fB298" target="_blank" class="thumbnail-link">
      <img src="thumbnail.jpg" alt="Thumbnail" class="video-thumbnail">
    </a>

    <div class="video-info-grid">
      
      <a href="https://www.youtube.com/@markiplier" target="_blank" class="channel-link">
        <div class="channel-picture-container">
          <div class="avatar-circle">M</div>

          <div class="channel-tooltip">
            <div class="avatar-circle-large">M</div>
            <div class="tooltip-info">
              <div class="tooltip-name">Markiplier</div>
              <div class="tooltip-subscribers">30M subscribers</div>
            </div>
          </div>
        </div>
      </a>

      <div class="video-text-details">
        <a class="video-title-link" href="https://www.youtube.com/watch?v=fNKUx1fB298" target="_blank">
          Try Not To Laugh Challenge #9
        </a>
        <p class="video-author">Markiplier</p>
        <p class="video-stats">30M views &bull; 6 months ago</p>
      </div>

    </div>
  </div>

</body>
</html>
